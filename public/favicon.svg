<svg width="32" height="32" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="55%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="25%" r="60%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Badge -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>
  <rect width="40" height="40" rx="10" fill="url(#glow)"/>

  <!-- Outer ring connections -->
  <g stroke="white" stroke-linecap="round" opacity="0.28">
    <line x1="21.8" y1="10.2" x2="27.5" y2="13.5" stroke-width="1"/>
    <line x1="29"   y1="16"   x2="29"   y2="24"   stroke-width="1"/>
    <line x1="27.5" y1="26.5" x2="21.8" y2="29.8" stroke-width="1"/>
    <line x1="18.2" y1="29.8" x2="12.5" y2="26.5" stroke-width="1"/>
    <line x1="11"   y1="24"   x2="11"   y2="16"   stroke-width="1"/>
    <line x1="12.5" y1="13.5" x2="18.2" y2="10.2" stroke-width="1"/>
  </g>

  <!-- Spokes from center -->
  <g stroke="white" stroke-linecap="round" opacity="0.65">
    <line x1="20"   y1="17.2" x2="20"   y2="11.5" stroke-width="1.5"/>
    <line x1="22.5" y1="18.6" x2="27.2" y2="15.7" stroke-width="1.5"/>
    <line x1="22.5" y1="21.4" x2="27.2" y2="24.3" stroke-width="1.5"/>
    <line x1="20"   y1="22.8" x2="20"   y2="28.5" stroke-width="1.5"/>
    <line x1="17.5" y1="21.4" x2="12.8" y2="24.3" stroke-width="1.5"/>
    <line x1="17.5" y1="18.6" x2="12.8" y2="15.7" stroke-width="1.5"/>
  </g>

  <!-- Outer nodes -->
  <g fill="white">
    <circle cx="20"  cy="9.5"  r="2.2" opacity="0.88"/>
    <circle cx="29"  cy="14.5" r="2"   opacity="0.82"/>
    <circle cx="29"  cy="25.5" r="2"   opacity="0.78"/>
    <circle cx="20"  cy="30.5" r="2.2" opacity="0.75"/>
    <circle cx="11"  cy="25.5" r="2"   opacity="0.78"/>
    <circle cx="11"  cy="14.5" r="2"   opacity="0.82"/>
  </g>

  <!-- Center node -->
  <circle cx="20" cy="20" r="3.4" fill="white"/>
  <circle cx="20" cy="20" r="5.5" fill="none" stroke="white" stroke-width="0.8" opacity="0.25"/>
</svg>
